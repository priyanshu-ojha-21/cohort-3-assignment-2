<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insights & Blogs - ScaleX</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="./assets/ScaleX_Logo.png">
</head>
<body>
    <div class="main-container">
        
        <nav class="navbar">
            <div class="logo">
                <img src="./assets/ScaleX_Logo.png" class="logo-icon"/> ScaleX
            </div>
            
            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">About Us</a></li>
                <li><a href="#">Blogs</a></li>
                <li><a href="#">Contact Us</a></li>
            </ul>

            <a href="#" class="btn-get-started">Get Started</a>
        </nav>

        <header class="blog-header">
            <h1>Insights & Blogs</h1>
            <div class="category-filters">
                <button class="filter-btn active">All</button>
                <button class="filter-btn">Tech</button>
                <button class="filter-btn">SaaS</button>
                <button class="filter-btn">Marketing</button>
            </div>
        </header>

        <section class="blog-grid">
            
            <div class="blog-card">
                <img src="https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?auto=format&fit=crop&w=400&q=80" alt="Cocktail Glass">
                <div class="card-content">
                    <span class="tag">Tech</span>
                    <h3>The Ultimate Guide To SaaS Marketing</h3>
                    <p class="date">May 23, 2025</p>
                </div>
            </div>

            <div class="blog-card">
                <img src="https://images.unsplash.com/photo-1503602642458-232111445657?auto=format&fit=crop&w=400&q=80" alt="Green Chair">
                <div class="card-content">
                    <span class="tag">SaaS</span>
                    <h3>5 Key Trends In SaaS Growth For 2025</h3>
                    <p class="date">May 23, 2025</p>
                </div>
            </div>

            <div class="blog-card">
                <img src="https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?auto=format&fit=crop&w=400&q=80" alt="Orange Cat">
                <div class="card-content">
                    <span class="tag">Marketing</span>
                    <h3>How Data-Driven Strategies Are Important</h3>
                    <p class="date">May 23, 2025</p>
                </div>
            </div>

        </section>

    </div>
</body>
</html>
